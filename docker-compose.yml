services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: iam_crm
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: iam_crm
    ports:
      - "15432:5432"
    volumes:
      - iam_crm_db_data:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://iam_crm:changeme@db:5432/iam_crm?schema=public"
      JWT_SECRET: "change-this-to-a-long-random-string"
      JWT_EXPIRES_IN: "8h"
      PORT: 3000
      CORS_ORIGINS: "http://localhost:5173"
      CORS_CREDENTIALS: "false"
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"

volumes:
  iam_crm_db_data: